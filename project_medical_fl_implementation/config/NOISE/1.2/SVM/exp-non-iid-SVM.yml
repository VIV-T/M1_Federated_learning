name: fluke.algorithms.dpfedavg.DPFedAVG 

data:
  client_split: 0.2
  dataset:
    path: ./data
    name: diabetes 
  distribution:
    name: dir     
    beta: 0.3
  keep_test: true
  sampling_perc: 1.0
  server_test: true
  uniform_test: false

eval:
  eval_every: 1
  locals: true
  post_fit: true
  pre_fit: false
  server: true
  task: classification

exp:
  device: cpu 
  seed: 42
  inmemory: true

logger:
  name: CsvLog
  log_dir: runs/NOISE/1.2/SVM

protocol:
  eligible_perc: 1.0
  n_clients: 10 
  n_rounds: 30

hyperparameters:
  client:
    batch_size: 64
    local_epochs: 5
    loss: CrossEntropyLoss
    optimizer:
      name: SGD        
      lr: 0.001
      momentum: 0.9
      weight_decay: 1.0e-05
    persistency: true
    scheduler:
      gamma: 1
      step_size: 1
      
    # Paramètres utilisés par ton DPClient
    clipping: 1.0            
    dp_noise_multiplier: 1.2
  
  model: Diabetes_SVM
  net_args:
    input_dim: 21

  server:
    weighted: true    
    lr: 1.0